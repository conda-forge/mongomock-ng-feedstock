schema_version: 1

context:
  version: 7.9.3

package:
  name: mongomock-ng
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/m/mongomock-ng/mongomock_ng-${{ version }}.tar.gz
  sha256: cf6335d7840890b00649bbb2a0a5633a5365700796cfe9238571f7bc6d856d33

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - packaging
    - pytz
    - sentinels
tests:
  - python:
      imports:
        - mongomock_ng
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - '*'

about:
  summary: Replacement fake pymongo stub for testing simple MongoDB-dependent code
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/engFelipeMonteiro/mongomock-ng

extra:
  recipe-maintainers:
    - jan-janssen
